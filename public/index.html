<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArabicChat - منصة الدردشة العربية العالمية</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- نافذة تسجيل الدخول المطابقة للموقع الأصلي -->
        <div id="login-modal">
            <div class="login-box">
                <h3>تسجيل الدخول للدردشة</h3>
                <input type="text" id="username" placeholder="اسم المستخدم..." autocomplete="off" maxlength="20">
                <select id="age">
                    <option value="">تحديد العمر</option>
                    <option value="18">18</option>
                    <option value="20">20</option>
                    <option value="24">24</option>
                    <option value="30">30+</option>
                </select>
                <select id="gender">
                    <option value="">تحديد الجنس</option>
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
                <select id="country">
                    <option value="">تحديد البلد</option>
                    <option value="مصر">مصر</option>
                    <option value="الجزائر">الجزائر</option>
                    <option value="السعودية">السعودية</option>
                    <option value="العراق">العراق</option>
                </select>
                <button id="enter-btn">دخول</button>
            </div>
        </div>

        <!-- شاشة قائمة الغرف -->
        <div id="rooms-screen">
            <div class="header">
                <span class="logo">ArabicChat</span>
                <span id="user-profile-badge" class="user-badge">زائر</span>
            </div>
            <div class="rooms-container" id="rooms-list">
                <!-- يتم تعبئة الغرف ديناميكياً بواسطة السيرفر -->
            </div>
        </div>

        <!-- شاشة الشات الجماعي الداخلية -->
        <div id="chat-screen">
            <div class="header">
                <span id="current-room-title" class="logo">الغرفة</span>
                <button class="exit-room-btn" onclick="location.reload()">خروج</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- رسائل الشات تظهر هنا لحظياً -->
            </div>
            <div class="chat-footer">
                <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
                <button id="send-btn">إرسال</button>
            </div>
        </div>

    </div>

    <!-- مكتبة الـ Socket.io العميل -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let userData = {};
        let currentRoomKey = '';

        const loginModal = document.getElementById('login-modal');
        const roomsScreen = document.getElementById('rooms-screen');
        const chatScreen = document.getElementById('chat-screen');
        const roomsList = document.getElementById('rooms-list');
        const chatMessages = document.getElementById('chat-messages');

        // التعامل مع زر الدخول
        document.getElementById('enter-btn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const country = document.getElementById('country').value;

            if (!username) {
                alert('الرجاء كتابة اسم المستخدم أولاً.');
                return;
            }

            userData = { username, age, gender, country };
            document.getElementById('user-profile-badge').textContent = username;

            loginModal.style.display = 'none';
            roomsScreen.style.display = 'flex';
        });

        // استقبال وتحديث الغرف من السيرفر
        socket.on('init_rooms', (rooms) => {
            renderRooms(rooms);
        });

        socket.on('update_rooms', (rooms) => {
            renderRooms(rooms);
        });

        function renderRooms(rooms) {
            roomsList.innerHTML = '';
            for (let key in rooms) {
                const room = rooms[key];
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-info">
                        <span>${room.flag}</span>
                        <span>${room.name}</span>
                        <span style="color: var(--text-secondary); font-size: 0.8rem;">(👥 ${room.count})</span>
                    </div>
                    <button class="join-btn" onclick="joinSpecificRoom('${key}', '${room.name}')">دخول الغرفة</button>
                `;
                roomsList.appendChild(card);
            }
        }

        window.joinSpecificRoom = function(roomKey, roomName) {
            currentRoomKey = roomKey;
            socket.emit('join_room', { ...userData, roomKey });

            roomsScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            document.getElementById('current-room-title').textContent = roomName;
            chatMessages.innerHTML = ''; // تفريغ الرسائل القديمة عند الدخول
        };

        // إرسال الرسائل
        const sendMsg = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            socket.emit('send_message', { text });
            input.value = '';
        };

        document.getElementById('send-btn').addEventListener('click', sendMsg);
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });

        // استقبال الرسائل الجديدة
        socket.on('new_message', (data) => {
            const div = document.createElement('div');
            if (data.type === 'system') {
                div.className = 'chat-msg system';
                div.textContent = data.text;
            } else {
                div.className = 'chat-msg';
                div.innerHTML = `
                    <div>
                        <span class="sender-name">${data.sender}:</span>
                        <span>${data.text}</span>
                    </div>
                    <div class="msg-time">${data.timestamp}</div>
                `;
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    </script>
</body>
</html>
