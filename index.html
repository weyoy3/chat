<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; }
.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 5px 0px; }
.header > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 30px; padding: 5px 10px; display: inline-block; }
.header b { color: lavender; font-size: 14px; }

#chat { width: 100%; direction: rtl; }

#conv { padding: 3px; direction: rtl; }
#conv span, #conv p, #conv div { border-radius: 5px; padding: 3px 5px; margin: 5px; display: table; font-size: 18px; font-weight: normal; max-width: 80%; word-break: break-word; }

#sr { background: rgb(245, 245, 245); color: tomato; }

/* إخفاء تام وإلزامي لعبارة تم الاتصال لكي لا تظهر أبداً وحدها */
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); display: none !important; }

/* رسائل المستخدم نفسه (أنت) على اليمين */
#conv div { background: rgb(233, 236, 241); color: rgb(119, 119, 119); margin-right: 0; margin-left: auto; }

/* رسائل الطرف الآخر على اليسار */
#conv p { background: rgb(24, 149, 210); color: rgb(255, 255, 255); margin-left: 0; margin-right: auto; }

#send { display: table; width: 100%; background: rgb(248, 248, 248); padding: 2px 0px; border-top: 1px solid rgb(238, 238, 238); border-bottom: 1px solid rgb(238, 238, 238); }
#send p { display: table-cell; text-align: center; padding: 2px 4px; vertical-align: middle; }
#inp { width: 100%; padding: 6px; border: 1px solid rgb(221, 221, 221); border-radius: 5px; outline: none; font-size: 16px; direction: rtl; }
#snd { padding: 6px 15px; cursor: pointer; background: rgb(238, 238, 238); color: rgb(51, 51, 51); border: 1px solid rgb(204, 204, 204); border-radius: 3px; font-size: 14px; }

#out { font-size: 20px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 20px; }
#out span { color: red; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 2px 5px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="header">
   <a href="https://araby.co/">شات عربي</a>
   <b>دردشة عربية مجانية بدون تسجيل</b>
  </div>
  
  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
   </div>
   <div id="send">
     <p style="width: 15%;"><button id="snd">Send</button></p>
     <p style="width: 85%;"><input id="inp" type="text" autocomplete="off"></p>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a href="index.html">بحث عن متصل</a>
  </h5>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    // لا تظهر عبارة تم الاتصال إلا عند قدوم الحدث الفعلي من السيرفر عند دخول شخص ثاني
    socket.on('matched', () => {
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
    });

    socket.on('message', (msg) => {
      const p = document.createElement('p');
      p.textContent = msg;
      conv.appendChild(p);
      window.scrollTo(0, document.body.scrollHeight);
    });

    socket.on('partner_disconnected', () => {
      chat.style.display = 'none';
      out.style.display = 'block';
    });

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled) {
        socket.emit('message', text);
        const div = document.createElement('div');
        div.textContent = text;
        conv.appendChild(div);
        inp.value = "";
        window.scrollTo(0, document.body.scrollHeight);
      }
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });
  </script>
</body>
</html>
