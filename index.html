<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شات عربي | دردشة عشوائية</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.me {
      align-self: flex-start;
    }

    .message.partner {
      align-self: flex-end;
    }

    .message.system {
      align-self: center;
      max-width: 90%;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.7;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .me .bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .partner .bubble {
      background: #1f2937;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .system .bubble {
      background: rgba(255, 255, 255, 0.08);
      color: #d1d5db;
      font-size: 13px;
      text-align: center;
    }

    .time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .typing {
      padding: 0 16px 8px;
      color: var(--muted);
      font-size: 13px;
    }

    footer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 0 12px 12px;
    }

    .controls button {
      flex: 1;
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover:not(:disabled) {
      background: var(--danger-hover);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .message {
        max-width: 88%;
      }

      header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>شات عربي</h1>
      <div id="connectionStatus" class="status">جاري الاتصال بالخادم...</div>
    </header>

    <main id="messages" aria-live="polite"></main>

    <div id="typing" class="typing hidden">الطرف الآخر يكتب...</div>

    <footer>
      <input
        id="messageInput"
        type="text"
        placeholder="اكتب رسالتك هنا..."
        autocomplete="off"
        disabled
      />
      <button id="sendBtn" disabled>إرسال</button>
    </footer>

    <div class="controls">
      <button id="searchBtn">بحث عن متصل</button>
      <button id="stopBtn" class="danger hidden">إيقاف</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io();

    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const searchBtn = document.getElementById('searchBtn');
    const stopBtn = document.getElementById('stopBtn');
    const typingEl = document.getElementById('typing');
    const connectionStatus = document.getElementById('connectionStatus');

    let partnerTypingTimeout = null;
    let lastTypingSent = 0;

    function formatTime(timestamp) {
      return new Date(timestamp || Date.now()).toLocaleTimeString('ar-EG', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function addMessage(text, type = 'system', time = Date.now()) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${type}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const timeEl = document.createElement('div');
      timeEl.className = 'time';
      timeEl.textContent = formatTime(time);

      wrapper.appendChild(bubble);
      wrapper.appendChild(timeEl);

      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      typingEl.classList.remove('hidden');
      clearTimeout(partnerTypingTimeout);
      partnerTypingTimeout = setTimeout(hideTyping, 2500);
    }

    function hideTyping() {
      typingEl.classList.add('hidden');
      clearTimeout(partnerTypingTimeout);
    }

    function updateControls(state) {
      const isChatActive = state === 'active';

      messageInput.disabled = !isChatActive;
      sendBtn.disabled = !isChatActive;

      searchBtn.classList.toggle('hidden', state !== 'idle');
      stopBtn.classList.toggle('hidden', state === 'idle');

      if (state === 'searching') {
        stopBtn.textContent = 'إيقاف البحث';
      } else if (state === 'active') {
        stopBtn.textContent = 'إنهاء الدردشة';
        messageInput.focus();
      }

      if (!isChatActive) {
        hideTyping();
      }
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || messageInput.disabled) return;

      addMessage(text, 'me');
      socket.emit('message', text);

      messageInput.value = '';
      socket.emit('stop_typing');
      hideTyping();
    }

    searchBtn.addEventListener('click', () => {
      socket.emit('find_partner');
      updateControls('searching');
      addMessage('جاري البحث عن متصل...', 'system');
    });

    stopBtn.addEventListener('click', () => {
      socket.emit('leave_chat');
    });

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', () => {
      if (messageInput.disabled) return;

      const now = Date.now();
      if (now - lastTypingSent > 800) {
        socket.emit('typing');
        lastTypingSent = now;
      }
    });

    socket.on('connect', () => {
      connectionStatus.textContent = 'متصل بالخادم';
      updateControls('idle');
      addMessage('أهلاً بك! اضغط على "بحث عن متصل" لبدء الدردشة.', 'system');
    });

    socket.on('disconnect', () => {
      connectionStatus.textContent = 'انقطع الاتصال بالخادم';
      updateControls('idle');
      addMessage('انقطع الاتصال بالخادم. حاول تحديث الصفحة.', 'system');
    });

    socket.on('searching', () => {
      updateControls('searching');
    });

    socket.on('matched', () => {
      updateControls('active');
    });

    socket.on('system_message', (data) => {
      addMessage(data.text, 'system', data.time);
    });

    socket.on('message', (data) => {
      addMessage(data.text, 'partner', data.time);
    });

    socket.on('typing', () => {
      showTyping();
    });

    socket.on('stop_typing', () => {
      hideTyping();
    });

    socket.on('partner_disconnected', () => {
      addMessage('المستخدم غادر الدردشة', 'system');
    });

    socket.on('chat_ended', () => {
      updateControls('idle');
    });

    socket.on('left', () => {
      updateControls('idle');
      addMessage('تم إيقاف الدردشة.', 'system');
    });
  </script>
</body>
</html>
