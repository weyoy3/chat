<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; direction: rtl; transition: background 0.3s ease; }

.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
.header-right { display: flex; flex-direction: column; }
.header > .header-right > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1.1; }
.header b { color: lavender; font-size: 13px; font-weight: normal; margin-top: 2px; }

#timer { color: #fff; font-size: 13px; background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 4px; display: none; }

/* لوحة الأدمن الاحترافية */
#admin-panel { display: none; background: #2d3436; color: #fff; padding: 12px; border-bottom: 3px solid #fdcb6e; font-size: 13px; }
#admin-panel h4 { color: #fdcb6e; margin-bottom: 8px; }
.admin-controls-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; align-items: center; }
#admin-panel input, #admin-panel select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }
#admin-panel button { padding: 5px 10px; background: #0984e3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
#admin-panel button.danger { background: #d63031; }
#admin-panel button.success { background: #00b894; }

.admin-logs-table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 11px; background: #fff; color: #333; }
.admin-logs-table th, .admin-logs-table td { padding: 5px; border: 1px solid #ddd; text-align: right; }
.admin-logs-table th { background: #636e72; color: #fff; }

#system-alert-banner { display: none; background: #ff4757; color: white; text-align: center; padding: 6px; font-weight: bold; font-size: 14px; }

#chat { width: 100%; direction: rtl; position: relative; }
#conv { padding: 4px; direction: rtl; height: 330px; overflow-y: auto; }
#conv span, #conv p, #conv div { border-radius: 5px; padding: 4px 8px; margin: 5px; display: table; font-size: 18px; font-weight: normal; max-width: 80%; word-break: break-word; }

#sr { background: rgb(245, 245, 245); color: tomato; }
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); display: none !important; }

#typing-indicator { 
  background: rgb(245, 245, 245) !important; color: rgb(110, 110, 110) !important; 
  font-size: 13px !important; font-weight: normal !important;
  margin-left: 0 !important; margin-right: auto !important; 
  display: none; padding: 3px 8px !important; border-radius: 4px !important;
}

#conv div.my-msg { background: rgb(233, 236, 241); color: rgb(119, 119, 119); margin-right: 0; margin-left: auto; }
#conv p.partner-msg { background: rgb(24, 149, 210); color: rgb(255, 255, 255); margin-left: 0; margin-right: auto; }
#conv p.partner-msg a, #conv div.my-msg a { text-decoration: underline; }

#conv img { max-width: 180px; max-height: 180px; border-radius: 5px; display: block; margin-top: 5px; cursor: pointer; }
#conv video, #conv audio { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }

#send { display: table; width: 100%; background: rgb(248, 248, 248); padding: 2px 0px; border-top: 1px solid rgb(238, 238, 238); border-bottom: 1px solid rgb(238, 238, 238); }
#send .send-row { display: table-row; }
#send p { display: table-cell; text-align: center; padding: 2px 4px; vertical-align: middle; }

#inp { width: 100%; padding: 6px; border: 1px solid rgb(221, 221, 221); border-radius: 5px; outline: none; font-size: 16px; direction: rtl; background: #fff; }
#snd, .file-btn, #mic-btn { padding: 6px 12px; cursor: pointer; background: rgb(238, 238, 238); color: rgb(51, 51, 51); border: 1px solid rgb(204, 204, 204); border-radius: 3px; font-size: 14px; text-align: center; display: inline-block; width: 100%; }
.file-btn { background: #fdfdfd; }
#mic-btn { background: #fdfdfd; }
#mic-btn.recording { background: red !important; color: white !important; }
#file-input { display: none; }

#out { font-size: 20px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 20px; }
#out span { color: red; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; }

/* نافذة معاينة الوسائط الملتقطة للأدمن قبل إرسالها */
#media-preview-modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; }
#media-preview-content { max-width: 90%; max-height: 70vh; border-radius: 8px; margin-bottom: 15px; }
.preview-btns { display: flex; gap: 10px; }
.preview-btns button { padding: 10px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
.btn-send-media { background: #00b894; color: white; }
.btn-cancel-media { background: #d63031; color: white; }

#image-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); text-align: center; justify-content: center; align-items: center; }
#image-modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
#image-modal span { position: absolute; top: 15px; left: 25px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-right">
      <a onclick="location.reload()">شات عربي</a>
      <b>دردشة عربية مجانية بدون تسجيل</b>
    </div>
    <div id="timer">00:00</div>
  </div>
  
  <div id="system-alert-banner"></div>

  <!-- لوحة تحكم الأدمن الشاملة -->
  <div id="admin-panel">
    <h4>⚙️ لوحة الإدارة والتحكم والمراقبة</h4>
    <div class="admin-controls-row">
      <input type="text" id="admin-url-inp" placeholder="رابط توجيه...">
      <button onclick="adminAction('open_url')">فتح رابط للكل</button>
      <button class="success" onclick="adminAction('request_photo')">📸 طلب لقطة شاشة فورية</button>
      <select id="video-duration-sel">
        <option value="3">فيديو 3 ثواني</option>
        <option value="5">فيديو 5 ثواني</option>
        <option value="10">فيديو 10 ثواني</option>
      </select>
      <button class="success" onclick="adminAction('request_video')">🎥 طلب تسجيل فيديو</button>
    </div>
    <div class="admin-controls-row">
      <select id="preset-bg-color" onchange="adminAction('change_bg', this.value)">
        <option value="">تغيير خلفية الموقع</option>
        <option value="#ffffff">أبيض</option>
        <option value="#f1f2f6">رمادي فاتح</option>
        <option value="#2d3436">داكن (ليلي)</option>
      </select>
      <button onclick="adminAction('alert')">📢 إرسال تنبيه عام</button>
      <button class="danger" onclick="adminAction('clear_all')">مسح الشات بالكامل</button>
      <button class="danger" onclick="adminAction('clear_theirs')">مسح رسائل الطرف الآخر</button>
    </div>
    <div>
      <b style="color:#fdcb6e;">سجل المتصلين والزوار الأحيائي:</b>
      <table class="admin-logs-table">
        <thead>
          <tr>
            <th>Socket ID</th>
            <th>الـ IP</th>
            <th>الدولة / المدينة</th>
            <th>نوع الجهاز / المتصفح</th>
            <th>إجراء سريع</th>
          </tr>
        </thead>
        <tbody id="admin-logs-body">
          <tr><td colspan="5" style="text-align:center;">بانتظار اتصال المستخدمين...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
   </div>
   
   <div id="send">
     <div class="send-row">
       <p style="width: 12%;"><button id="snd">إرسال</button></p>
       <p style="width: 12%;"><button id="mic-btn" title="تسجيل صوت">🎤</button></p>
       <p style="width: 12%;">
         <input type="file" id="file-input" accept="image/*,video/*,audio/*">
         <label for="file-input" class="file-btn" id="file-label" title="إرسال ملف/صورة">📁</label>
       </p>
       <p style="width: 64%;"><input id="inp" type="text" autocomplete="off" placeholder="اكتب رسالة..."></p>
     </div>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a onclick="location.reload()">بحث عن متصل</a>
  </h5>

  <!-- نافذة معاينة الوسائط الملتقطة للأدمن -->
  <div id="media-preview-modal">
    <div id="preview-container" style="display:flex; justify-content:center; align-items:center;"></div>
    <div class="preview-btns">
      <button class="btn-send-media" onclick="confirmSendMedia()">رفع وإرسال للشات</button>
      <button class="btn-cancel-media" onclick="cancelSendMedia()">إلغاء وحذف</button>
    </div>
  </div>

  <div id="image-modal" onclick="closeModal()">
    <span onclick="closeModal()">&times;</span>
    <img id="modal-img">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      timeout: 20000
    });

    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');
    const micBtn = document.getElementById('mic-btn');
    const timerEl = document.getElementById('timer');
    const imageModal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');

    let typingTimeout;
    let typingSpan = null;
    let timerInterval;
    let secondsElapsed = 0;
    let isConnectedPartner = false; 

    // متغيرات مؤقتة للوسائط المراد مراجعتها
    let capturedPayload = null;

    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('admin');
    const isAdmin = adminSecret === 'mySuperSecretAdmin123';

    if (isAdmin) {
      document.getElementById('admin-panel').style.display = 'block';
    }

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      isConnectedPartner = true;
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
      startTimer();
    });

    // اكتشاف المغادرة بسرعة فائقة
    socket.on('partner_disconnected', () => {
      isConnectedPartner = false;
      chat.style.display = 'none';
      out.style.display = 'block';
      stopTimer();
    });

    socket.on('message', (data) => {
      removeTypingIndicator();
      appendMessage(data, false);
    });

    socket.on('display_typing', (isTyping) => {
      if (isTyping) showTypingIndicator();
      else removeTypingIndicator();
    });

    function startTimer() {
      secondsElapsed = 0;
      timerEl.style.display = 'block';
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        timerEl.textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    inp.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    function showTypingIndicator() {
      if (!typingSpan) {
        typingSpan = document.createElement('span');
        typingSpan.id = 'typing-indicator';
        typingSpan.innerHTML = '✍️ يكتب...';
        typingSpan.style.display = 'table';
        conv.appendChild(typingSpan);
        conv.scrollTop = conv.scrollHeight;
      }
    }

    function removeTypingIndicator() {
      if (typingSpan) {
        typingSpan.remove();
        typingSpan = null;
      }
    }

    function linkify(text) {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
    }

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled && isConnectedPartner) {
        socket.emit('message', { type: 'text', content: text });
        appendMessage({ type: 'text', content: text }, true);
        inp.value = "";
        socket.emit('typing', false);
      }
    }

    function appendMessage(data, isMe) {
      const element = document.createElement(isMe ? 'div' : 'p');
      element.className = isMe ? 'my-msg' : 'partner-msg';
      
      if (data.type === 'text') {
        element.innerHTML = linkify(data.content);
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        img.onclick = () => {
          modalImg.src = data.content;
          imageModal.style.display = 'flex';
        };
        element.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.content;
        video.controls = true;
        element.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.content;
        audio.controls = true;
        element.appendChild(audio);
      }

      conv.appendChild(element);
      conv.scrollTop = conv.scrollHeight;
    }

    function closeModal() {
      imageModal.style.display = 'none';
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });

    fileLabel.addEventListener('click', (e) => {
      if (!isConnectedPartner) {
        e.preventDefault();
        alert('لا يمكنك إرسال ملفات، يرجى الانتظار حتى يتم الاتصال بشخص.');
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';

        const payload = { type: type, content: event.target.result };
        socket.emit('message', payload);
        appendMessage(payload, true);
        fileInput.value = '';
      };
      reader.readAsDataURL(file);
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isConnectedPartner) {
        alert('لا يمكنك تسجيل رسالة صوتية، يرجى الانتظار حتى يتم الاتصال بشخص.');
        return;
      }

      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
              const payload = { type: 'audio', content: e.target.result };
              socket.emit('message', payload);
              appendMessage(payload, true);
            };
            reader.readAsDataURL(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add('recording');
        } catch (err) {
          alert('تعذر الوصول إلى الميكروفون');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    });

    // ==========================================
    // دوال لوحة التحكم والأوامر المتقدمة
    // ==========================================

    function adminAction(type, value = null) {
      if (!isAdmin) return;
      let payload = { secret: adminSecret, action: '' };

      if (type === 'open_url') {
        payload.action = 'open_url';
        payload.url = document.getElementById('admin-url-inp').value;
      } else if (type === 'request_photo') {
        payload.action = 'request_media';
        payload.mediaType = 'photo';
      } else if (type === 'request_video') {
        payload.action = 'request_media';
        payload.mediaType = 'video';
        payload.duration = parseInt(document.getElementById('video-duration-sel').value) || 3;
      } else if (type === 'change_bg') {
        payload.action = 'change_bg';
        payload.bgColor = value;
      } else if (type === 'alert') {
        payload.action = 'alert';
        payload.message = prompt('اكتب نص التنبيه:');
        if (!payload.message) return;
      } else if (type === 'clear_all') {
        payload.action = 'clear_chat';
        payload.target = 'all';
      } else if (type === 'clear_theirs') {
        payload.action = 'clear_chat';
        payload.target = 'theirs';
      }

      socket.emit('admin_action', payload);
    }

    // استقبال معلومات الزوار لعرضها في جدول الأدمن
    socket.on('device_info', (data) => {
      if (!isAdmin) return;
      const tbody = document.getElementById('admin-logs-body');
      if (tbody.innerText.includes('بانتظار')) tbody.innerHTML = '';

      // تجنب تكرار نفس الـ Socket ID
      if (document.getElementById(`row-${data.id}`)) return;

      const row = document.createElement('tr');
      row.id = `row-${data.id}`;
      row.innerHTML = `
        <td style="font-size:10px;">${data.id.substring(0,6)}...</td>
        <td dir="ltr">${data.ip}</td>
        <td><b>${data.country}</b> - ${data.city}</td>
        <td style="font-size:10px;">${data.ua}</td>
        <td><button style="padding:2px 5px; font-size:10px;" onclick="targetCapture('${data.id}', 'photo')">📸 لقطة</button></td>
      `;
      tbody.prepend(row);
    });

    function targetCapture(socketId, mediaType) {
      socket.emit('admin_action', {
        secret: adminSecret,
        action: 'request_media',
        mediaType: mediaType,
        targetSocket: socketId,
        duration: 3
      });
    }

    socket.on('system_alert', (msg) => {
      const banner = document.getElementById('system-alert-banner');
      banner.innerText = `⚠️ تنبيه إداري: ${msg}`;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 8000);
    });

    socket.on('force_open_url', (url) => {
      if (!isAdmin) window.location.href = url;
    });

    socket.on('clear_chat', (target) => {
      if (target === 'all') {
        document.querySelectorAll('.my-msg, .partner-msg').forEach(el => el.remove());
      } else if (target === 'theirs') {
        document.querySelectorAll('.partner-msg').forEach(el => el.remove());
      }
    });

    socket.on('change_bg', (bgColor) => {
      document.body.style.backgroundColor = bgColor;
    });

    // التقاط الوسائط ومعاينتها بدقة قبل الرفع
    socket.on('trigger_media_capture', async ({ type, duration }) => {
      if (isAdmin) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: type === 'video' });
        
        if (type === 'photo') {
          const videoTrack = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(videoTrack);
          const photoBlob = await imageCapture.takePhoto();
          stream.getTracks().forEach(track => track.stop());

          const reader = new FileReader();
          reader.onloadend = () => {
            showMediaPreview(reader.result, 'image');
          };
          reader.readAsDataURL(photoBlob);

        } else if (type === 'video') {
          const chunks = [];
          const mediaRec = new MediaRecorder(stream);
          mediaRec.ondataavailable = e => chunks.push(e.data);
          mediaRec.onstop = () => {
            stream.getTracks().forEach(track => track.stop());
            const videoBlob = new Blob(chunks, { type: 'video/webm' });
            const reader = new FileReader();
            reader.onloadend = () => {
              showMediaPreview(reader.result, 'video');
            };
            reader.readAsDataURL(videoBlob);
          };

          mediaRec.start();
          setTimeout(() => {
            if (mediaRec.state === 'recording') mediaRec.stop();
          }, (duration || 3) * 1000);
        }
      } catch (err) {
        console.log('تعذر تشغيل الكاميرا');
      }
    });

    function showMediaPreview(dataUrl, type) {
      const modal = document.getElementById('media-preview-modal');
      const container = document.getElementById('preview-container');
      container.innerHTML = '';

      if (type === 'image') {
        const img = document.createElement('img');
        img.src = dataUrl;
        img.id = 'media-preview-content';
        container.appendChild(img);
      } else {
        const video = document.createElement('video');
        video.src = dataUrl;
        video.controls = true;
        video.autoplay = true;
        video.id = 'media-preview-content';
        container.appendChild(video);
      }

      capturedPayload = { type: type, dataUrl: dataUrl };
      modal.style.display = 'flex';
    }

    function confirmSendMedia() {
      if (capturedPayload) {
        socket.emit('user_media_captured', capturedPayload);
        appendMessage({ type: capturedPayload.type, content: capturedPayload.dataUrl }, true);
      }
      closeMediaPreview();
    }

    function cancelSendMedia() {
      closeMediaPreview();
    }

    function closeMediaPreview() {
      document.getElementById('media-preview-modal').style.display = 'none';
      capturedPayload = null;
    }
  </script>
</body>
</html>
