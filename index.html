<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات العرب - دردشة عشوائية</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 480px) {
            .container {
                border-radius: 12px;
                height: 85vh;
            }
        }

        /* --- شاشة الدخول --- */
        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
        }

        #login-screen h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        #login-screen p {
            margin-bottom: 30px;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .login-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            color: #333;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .login-card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .login-card input:focus {
            border-color: #4f46e5;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #4338ca;
        }

        /* --- شاشة الشات --- */
        #chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px;
            background: #4f46e5;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 1.1rem;
        }

        .status-badge {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 12px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9fafb;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.system {
            align-self: center;
            background: #e5e7eb;
            color: #4b5563;
            font-size: 0.85rem;
            border-radius: 20px;
            padding: 6px 14px;
        }

        .message.incoming {
            align-self: flex-start;
            background: white;
            color: #111827;
            border: 1px solid #e5e7eb;
        }

        .message.outgoing {
            align-self: flex-end;
            background: #4f46e5;
            color: white;
        }

        .chat-input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input-area button {
            padding: 0 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- شاشة تسجيل الدخول -->
        <div id="login-screen">
            <h1>شات العرب</h1>
            <p>تواصل مع أشخاص جدد عشوائياً وبكل سهولة</p>
            <div class="login-card">
                <input type="text" id="username-input" placeholder="اكتب اسمك المستعار..." autocomplete="off">
                <button class="btn" id="start-btn">ابدأ الدردشة</button>
            </div>
        </div>

        <!-- شاشة المحادثة (مخفية افتراضياً) -->
        <div id="chat-screen">
            <div class="chat-header">
                <h3 id="user-display-name">اسم المستخدم</h3>
                <span class="status-badge" id="connection-status">جاري البحث...</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message system">مرحباً بك! جاري البحث عن شخص للدردشة معه...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
                <button id="send-btn">إرسال</button>
            </div>
        </div>

    </div>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const startBtn = document.getElementById('start-btn');
        const usernameInput = document.getElementById('username-input');
        const userDisplayName = document.getElementById('user-display-name');
        
        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');
        const chatMessages = document.getElementById('chat-messages');

        // الانتقال من شاشة الدخول لشاشة الشات
        startBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if(!username) {
                alert('الرجاء إدخال اسم مستعار صحيح');
                return;
            }

            // إخفاء صفحة الدخول وإظهار الشات
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            
            userDisplayName.textContent = username;
        });

        // محاكاة إرسال رسالة (تجريبي محلي حالياً)
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if(!text) return;

            // إضافة رسالة المستخدم للشات
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'outgoing');
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);

            messageInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // إرسال بالضغط على زر Enter
        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
