<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 6px 10px; flex-shrink: 0; }
.header > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 26px; font-weight: bold; cursor: pointer; display: inline-block; }
.header b { color: lavender; font-size: 13px; margin-right: 8px; }

#chat { flex: 1; display: flex; flex-direction: column; direction: rtl; overflow: hidden; }

#conv { flex: 1; padding: 10px; overflow-y: auto; direction: rtl; background: #fff; }
#conv span, #conv p, #conv div { border-radius: 6px; padding: 6px 10px; margin: 6px 0; display: table; font-size: 16px; font-weight: normal; max-width: 82%; word-break: break-word; line-height: 1.4; }

#sr { background: rgb(245, 245, 245); color: tomato; }
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); display: none !important; }

/* مؤشر الكتابة الاحترافي بتنسيق خفيف وهادئ */
#typing-indicator { background: rgb(245, 245, 245) !important; color: rgb(140, 140, 140) !important; font-style: italic; font-size: 13px !important; margin-right: 0 !important; margin-left: auto !important; display: none; }

/* رسائل المستخدم نفسه على اليمين */
#conv div.my-msg { background: rgb(233, 236, 241); color: rgb(50, 50, 50); margin-right: 0; margin-left: auto; }

/* رسائل الطرف الآخر على اليسار */
#conv p.partner-msg { background: rgb(24, 149, 210); color: rgb(255, 255, 255); margin-left: 0; margin-right: auto; }

#conv img, #conv video { max-width: 220px; border-radius: 6px; display: block; margin-top: 5px; }

/* شريط الإرسال السفلي المرتب تماماً والمتجاوب مع الموبايل */
#send { background: rgb(248, 248, 248); padding: 8px; border-top: 1px solid rgb(230, 230, 230); flex-shrink: 0; display: flex; align-items: center; gap: 6px; direction: rtl; }

#inp { flex: 1; padding: 8px 10px; border: 1px solid rgb(210, 210, 210); border-radius: 5px; outline: none; font-size: 15px; direction: rtl; background: #fff; }

.action-btn, #snd { padding: 8px 12px; cursor: pointer; background: rgb(240, 240, 240); color: rgb(60, 60, 60); border: 1px solid rgb(200, 200, 200); border-radius: 5px; font-size: 14px; text-align: center; display: inline-flex; align-items: center; justify-content: center; user-select: none; }
#snd { background: rgb(24, 149, 210); color: #fff; border-color: rgb(20, 130, 185); font-weight: bold; }
#mic-btn.recording { background: red !important; color: white !important; border-color: darkred; }

#file-input { display: none; }

#out { font-size: 18px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 30px; }
#out span { color: red; font-weight: bold; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; display: inline-block; margin-top: 10px; }
</style>
</head>
<body>
  <div class="header">
   <a onclick="location.reload()">شات عربي</a>
   <b>دردشة عربية مجانية بدون تسجيل</b>
  </div>
  
  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
   </div>
   
   <div id="send">
     <input id="inp" type="text" autocomplete="off" placeholder="اكتب رسالة...">
     <button id="mic-btn" class="action-btn" title="تسجيل صوت">🎤</button>
     <label for="file-input" class="action-btn" title="إرسال ملف أو صورة">📁</label>
     <input type="file" id="file-input" accept="image/*,video/*,audio/*">
     <button id="snd">إرسال</button>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a onclick="location.reload()">بحث عن متصل</a>
  </h5>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file-input');
    const micBtn = document.getElementById('mic-btn');

    let typingTimeout;
    let typingSpan = null;

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
    });

    socket.on('message', (data) => {
      removeTypingIndicator();
      appendMessage(data, false);
    });

    socket.on('display_typing', (isTyping) => {
      if (isTyping) {
        showTypingIndicator();
      } else {
        removeTypingIndicator();
      }
    });

    socket.on('partner_disconnected', () => {
      chat.style.display = 'none';
      out.style.display = 'block';
    });

    inp.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    function showTypingIndicator() {
      if (!typingSpan) {
        typingSpan = document.createElement('span');
        typingSpan.id = 'typing-indicator';
        typingSpan.textContent = 'الطرف الآخر يكتب الآن...';
        typingSpan.style.display = 'table';
        conv.appendChild(typingSpan);
        conv.scrollTop = conv.scrollHeight;
      }
    }

    function removeTypingIndicator() {
      if (typingSpan) {
        typingSpan.remove();
        typingSpan = null;
      }
    }

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled) {
        socket.emit('message', { type: 'text', content: text });
        appendMessage({ type: 'text', content: text }, true);
        inp.value = "";
        socket.emit('typing', false);
      }
    }

    function appendMessage(data, isMe) {
      const element = document.createElement(isMe ? 'div' : 'p');
      element.className = isMe ? 'my-msg' : 'partner-msg';
      
      if (data.type === 'text') {
        element.textContent = data.content;
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        element.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.content;
        video.controls = true;
        element.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.content;
        audio.controls = true;
        element.appendChild(audio);
      }

      conv.appendChild(element);
      conv.scrollTop = conv.scrollHeight;
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';

        const payload = { type: type, content: event.target.result };
        socket.emit('message', payload);
        appendMessage(payload, true);
      };
      reader.readAsDataURL(file);
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
              const payload = { type: 'audio', content: e.target.result };
              socket.emit('message', payload);
              appendMessage(payload, true);
            };
            reader.readAsDataURL(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add('recording');
        } catch (err) {
          alert('تعذر الوصول إلى الميكروفون');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    });
  </script>
</body>
</html>
