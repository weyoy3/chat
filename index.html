<!DOCTYPE html>
<html lang="ar">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات عربي | دردشة عشوائية</title>
<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background-color: #fff; }
.header { background-color: rgb(24, 149, 210); direction: rtl; padding: 5px 0px; }
.header > a { color: rgb(255, 255, 255); text-decoration: none; font-size: 30px; padding: 5px 10px; display: inline-block; cursor: pointer; }
.header b { color: lavender; font-size: 14px; }

#chat { width: 100%; direction: rtl; }
#conv { padding: 10px; direction: rtl; height: 350px; overflow-y: auto; }
#conv span, #conv p, #conv div { border-radius: 5px; padding: 5px 8px; margin: 5px; display: table; font-size: 16px; font-weight: normal; max-width: 80%; word-break: break-word; }

#sr { background: rgb(245, 245, 245); color: tomato; }
#hi { background: rgb(245, 245, 245); color: rgb(41, 177, 63); display: none !important; }
#typing-indicator { background: transparent; color: #888; font-style: italic; font-size: 14px; display: none; margin: 5px; }

/* رسائل المستخدم نفسه على اليمين */
#conv div { background: rgb(233, 236, 241); color: rgb(119, 119, 119); margin-right: 0; margin-left: auto; }
/* رسائل الطرف الآخر على اليسار */
#conv p { background: rgb(24, 149, 210); color: rgb(255, 255, 255); margin-left: 0; margin-right: auto; }

#conv img, #conv video { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }

#send { display: flex; width: 100%; background: rgb(248, 248, 248); padding: 5px; border-top: 1px solid rgb(238, 238, 238); border-bottom: 1px solid rgb(238, 238, 238); align-items: center; gap: 5px; }
#inp { flex: 1; padding: 6px; border: 1px solid rgb(221, 221, 221); border-radius: 5px; outline: none; font-size: 16px; direction: rtl; }
#snd, .file-btn, #mic-btn { padding: 6px 12px; cursor: pointer; background: rgb(238, 238, 238); color: rgb(51, 51, 51); border: 1px solid rgb(204, 204, 204); border-radius: 3px; font-size: 14px; }
.file-btn { display: inline-block; text-align: center; }
#file-input { display: none; }

#out { font-size: 20px; font-weight: normal; text-align: center; direction: rtl; display: none; padding: 20px; }
#out span { color: red; }
#out a { background: coral; color: rgb(255, 255, 255); text-decoration: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; }
</style>
</head>
<body>
  <div class="header">
   <a onclick="location.reload()">شات عربي</a>
   <b>دردشة عربية مجانية بدون تسجيل</b>
  </div>
  
  <div id="chat">
   <div id="conv">
    <span id="sr">جاري البحث عن متصل</span>
    <span id="hi">تم الاتصال, قل مرحبا</span>
    <div id="typing-indicator">الطرف الآخر يكتب الآن...</div>
   </div>
   <div id="send">
     <input type="file" id="file-input" accept="image/*,video/*,audio/*">
     <label for="file-input" class="file-btn">📁</label>
     <button id="mic-btn">🎤</button>
     <input id="inp" type="text" autocomplete="off" placeholder="اكتب رسالة...">
     <button id="snd">إرسال</button>
   </div>
  </div>

  <h5 id="out">
    <span>المستخدم غادر الدردشة</span><br><br>
    <a onclick="location.reload()">بحث عن متصل</a>
  </h5>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const sr = document.getElementById('sr');
    const hi = document.getElementById('hi');
    const typingIndicator = document.getElementById('typing-indicator');
    const conv = document.getElementById('conv');
    const inp = document.getElementById('inp');
    const snd = document.getElementById('snd');
    const chat = document.getElementById('chat');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file-input');
    const micBtn = document.getElementById('mic-btn');

    let typingTimeout;

    inp.disabled = true;
    snd.disabled = true;

    socket.emit('find_partner');

    socket.on('matched', () => {
      hi.style.setProperty('display', 'table', 'important');
      inp.disabled = false;
      snd.disabled = false;
      inp.focus();
    });

    // استقبال الرسائل النصية أو الوسائط
    socket.on('message', (data) => {
      appendMessage(data, false);
    });

    // مؤشر الكتابة
    socket.on('display_typing', (isTyping) => {
      typingIndicator.style.display = isTyping ? 'table' : 'none';
      conv.scrollTop = conv.scrollHeight;
    });

    socket.on('partner_disconnected', () => {
      chat.style.display = 'none';
      out.style.display = 'block';
    });

    inp.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    function sendMsg() {
      const text = inp.value.trim();
      if(text !== "" && !inp.disabled) {
        socket.emit('message', { type: 'text', content: text });
        appendMessage({ type: 'text', content: text }, true);
        inp.value = "";
        socket.emit('typing', false);
      }
    }

    function appendMessage(data, isMe) {
      const wrapper = document.createElement(isMe ? 'div' : 'p');
      
      if (data.type === 'text') {
        wrapper.textContent = data.content;
      } else if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.content;
        wrapper.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.content;
        video.controls = true;
        wrapper.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.content;
        audio.controls = true;
        wrapper.appendChild(audio);
      }

      conv.insertBefore(wrapper, typingIndicator);
      conv.scrollTop = conv.scrollHeight;
    }

    snd.addEventListener('click', sendMsg);
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') sendMsg();
    });

    // رفع الصور والفيديوهات
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        let type = 'image';
        if (file.type.startsWith('video')) type = 'video';
        else if (file.type.startsWith('audio')) type = 'audio';

        const payload = { type: type, content: event.target.result };
        socket.emit('message', payload);
        appendMessage(payload, true);
      };
      reader.readAsDataURL(file);
    });

    // تسجيل الصوت المباشر (Voice Recording)
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
              const payload = { type: 'audio', content: e.target.result };
              socket.emit('message', payload);
              appendMessage(payload, true);
            };
            reader.readAsDataURL(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.style.background = 'red';
          micBtn.style.color = '#fff';
        } catch (err) {
          alert('تعذر الوصول إلى الميكروفون');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.style.background = '';
        micBtn.style.color = '';
      }
    });
  </script>
</body>
</html>
